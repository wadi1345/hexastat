<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>遊戲強化機率模擬器</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { text-align: center; color: #333; }
        .stats-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; text-align: center; }
        .stat-card { padding: 15px; border-radius: 8px; background: #e9ecef; }
        .stat-card.main { background: #ffeaa7; border: 2px solid #fdcb6e; }
        .level { font-size: 24px; font-weight: bold; display: block; }
        .info-panel { margin-bottom: 20px; padding: 10px; background: #f8f9fa; border-left: 5px solid #0984e3; }
        .controls { text-align: center; margin-bottom: 20px; }
        button { padding: 12px 24px; font-size: 18px; cursor: pointer; border: none; border-radius: 6px; transition: 0.3s; }
        .btn-upgrade { background-color: #00b894; color: white; }
        .btn-upgrade:hover { background-color: #00947a; }
        .btn-upgrade:disabled { background-color: #ccc; cursor: not-allowed; }
        .btn-reset { background-color: #d63031; color: white; display: none; margin-top: 10px; }
        .log { height: 250px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; font-size: 14px; background: #2d3436; color: #dfe6e9; border-radius: 4px; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #444; padding-bottom: 2px; }
        .success { color: #55efc4; font-weight: bold; }
        .cost-summary { font-weight: bold; color: #d63031; margin-top: 10px; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <h1>強化模擬測試</h1>
    
    <div class="info-panel">
        <div>剩餘強化次數：<span id="remaining">20</span> / 20</div>
        <div class="cost-summary">目前總花費：<span id="total-cost">0</span> 碎片</div>
    </div>

    <div class="stats-board">
        <div class="stat-card main">
            主要屬性
            <span class="level" id="lv-main">0</span>
            <small id="prob-main">機率: --</small>
        </div>
        <div class="stat-card">
            附加屬性 A
            <span class="level" id="lv-sub1">0</span>
            <small id="prob-sub1">機率: --</small>
        </div>
        <div class="stat-card">
            附加屬性 B
            <span class="level" id="lv-sub2">0</span>
            <small id="prob-sub2">機率: --</small>
        </div>
    </div>

    <div class="controls">
        <button id="upgrade-btn" class="btn-upgrade" onclick="performUpgrade()">進行強化</button>
        <button id="reset-btn" class="btn-reset" onclick="resetGame()">重置模擬</button>
    </div>

    <div class="log" id="log">
        <div class="log-entry">系統就緒，請開始點擊強化。</div>
    </div>
</div>

<script>
    let remainingStrikes = 20;
    let totalCost = 0;
    let lvMain = 0;
    let lvSub1 = 0;
    let lvSub2 = 0;

    function getProbabilities(lv) {
        let mainProb, cost;
        // 根據目前等級判定機率與花費
        if (lv < 2) { mainProb = 0.35; cost = 10; }
        else if (lv < 6) { mainProb = 0.20; cost = 20; }
        else if (lv < 7) { mainProb = 0.15; cost = 30; }
        else if (lv < 8) { mainProb = 0.10; cost = 40; }
        else { mainProb = 0.05; cost = 50; }

        // 如果主要屬性已滿 10 級，機率歸 0
        if (lv >= 10) mainProb = 0;

        // 計算附加屬性機率（均分剩餘機率）
        // 檢查附加屬性是否已達上限
        let sub1Available = lvSub1 < 10;
        let sub2Available = lvSub2 < 10;
        let activeSubs = (sub1Available ? 1 : 0) + (sub2Available ? 1 : 0);
        
        let subProb = activeSubs > 0 ? (1 - mainProb) / activeSubs : 0;

        return {
            main: mainProb,
            sub1: sub1Available ? subProb : 0,
            sub2: sub2Available ? subProb : 0,
            cost: cost
        };
    }

    function updateUI() {
        document.getElementById('remaining').innerText = remainingStrikes;
        document.getElementById('total-cost').innerText = totalCost;
        document.getElementById('lv-main').innerText = lvMain;
        document.getElementById('lv-sub1').innerText = lvSub1;
        document.getElementById('lv-sub2').innerText = lvSub2;

        const probs = getProbabilities(lvMain);
        document.getElementById('prob-main').innerText = `機率: ${Math.round(probs.main * 100)}%`;
        document.getElementById('prob-sub1').innerText = `機率: ${Math.round(probs.sub1 * 100)}%`;
        document.getElementById('prob-sub2').innerText = `機率: ${Math.round(probs.sub2 * 100)}%`;

        if (remainingStrikes <= 0) {
            document.getElementById('upgrade-btn').disabled = true;
            document.getElementById('reset-btn').style.display = 'inline-block';
        }
    }

    function performUpgrade() {
        if (remainingStrikes <= 0) return;

        const probs = getProbabilities(lvMain);
        totalCost += probs.cost;
        remainingStrikes--;

        const roll = Math.random();
        let resultText = "";
        let target = "";

        if (roll < probs.main) {
            lvMain++;
            target = "主要屬性";
        } else if (roll < probs.main + probs.sub1) {
            lvSub1++;
            target = "附加屬性 A";
        } else if (roll < probs.main + probs.sub1 + probs.sub2) {
            lvSub2++;
            target = "附加屬性 B";
        } else {
            resultText = "強化失敗 (所有屬性已滿或異常)";
        }

        if (target !== "") {
            resultText = `<span class="success">成功！</span> ${target} 強化等級上升。 (花費: ${probs.cost})`;
        }

        const log = document.getElementById('log');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `[第 ${20 - remainingStrikes} 次] ${resultText}`;
        log.prepend(entry);

        updateUI();
    }

    function resetGame() {
        remainingStrikes = 20;
        totalCost = 0;
        lvMain = 0;
        lvSub1 = 0;
        lvSub2 = 0;
        document.getElementById('log').innerHTML = '<div class="log-entry">模擬已重置。</div>';
        document.getElementById('upgrade-btn').disabled = false;
        document.getElementById('reset-btn').style.display = 'none';
        updateUI();
    }

    // 初始化介面
    updateUI();
</script>

</body>
</html>
